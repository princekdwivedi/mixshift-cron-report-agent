<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cron Report Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="page">
    <header class="top">
      <div>
        <p class="eyebrow">Mixshift · Ops</p>
        <h1>Cron Report</h1>
      </div>
      <p class="sub">SP API · Ad API · Backend · SQP</p>
    </header>

    <form id="report-form" class="panel form" autocomplete="off">
      <label>
        <span>Database name</span>
        <input name="dbname" id="dbname" required placeholder="tenant_db_name" />
      </label>
      <label>
        <span>Seller ID</span>
        <input name="sellerId" id="sellerId" required placeholder="seller.ID or AmazonSellerID" />
      </label>
      <label>
        <span>Service</span>
        <select name="service" id="service" required>
          <option value="">Select service…</option>
          <option value="sp">SP API</option>
          <option value="ad">Ad API</option>
          <option value="backend">Backend</option>
          <option value="sqp">SQP</option>
          <option value="all">All services</option>
        </select>
      </label>
      <label>
        <span>Cron job</span>
        <select name="cronJob" id="cronJob" required disabled>
          <option value="">Select a service first…</option>
        </select>
        <span class="field-hint" id="job-hint">Jobs appear after you pick a service</span>
      </label>
      <div class="actions">
        <button type="submit" id="run-btn">Run report</button>
        <button type="button" id="raw-toggle" class="ghost" disabled>Toggle raw JSON</button>
      </div>
    </form>

    <div id="status" class="status" hidden></div>

    <section id="results" class="results" hidden>
      <div class="summary-bar" id="summary-bar"></div>
      <div id="services" class="services"></div>
      <pre id="raw-json" class="raw" hidden></pre>
    </section>
  </div>
  <script src="/app.js"></script>
</body>
</html>
